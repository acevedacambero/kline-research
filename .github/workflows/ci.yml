name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install Python dependencies
        run: python -m pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Test backend
        run: pytest -q

  frontend-and-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: |
          python -m pip install -e ".[dev]"
          pnpm install --frozen-lockfile
      - name: Verify generated OpenAPI client
        run: |
          python scripts/export_openapi.py
          pnpm --dir web exec openapi-typescript openapi.json -o src/generated-api.d.ts
          git diff --exit-code -- web/openapi.json web/src/generated-api.d.ts
      - name: Test frontend
        run: pnpm --dir web test -- --run
      - name: Build frontend
        run: pnpm --dir web build
